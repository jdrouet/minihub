[workspace]
# Don't publish to crates.io — git tags + GitHub releases only.
publish = false
git_release_enable = true
# Use git tags (not crates.io registry) to detect the current version.
git_only = true
# Tag per package: e.g. minihub-domain-v0.1.0
git_tag_name = "{{ package }}-v{{ version }}"
git_release_name = "{{ package }}-v{{ version }}"
# Disable built-in semver check (cargo package incompatible with unpublished path deps).
# Semver checks run in a separate CI job instead.
semver_check = false
publish_no_verify = true
